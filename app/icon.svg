<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Charcoal background matching roofignite.com favicon -->
  <rect width="100" height="100" rx="18" fill="#2D2D2D"/>

  <!-- R - vertical stroke -->
  <rect x="11" y="22" width="11" height="58" rx="1.5" fill="white"/>
  <!-- R - bowl top bar -->
  <rect x="11" y="22" width="31" height="10" rx="1.5" fill="white"/>
  <!-- R - bowl curve (right side, filled semicircle) -->
  <path d="M42 22 Q56 22 56 37 Q56 52 42 52 L11 52 L11 42 L40 42 Q46 42 46 37 Q46 32 40 32 L11 32 L11 22 Z" fill="white"/>
  <!-- R - mid bar -->
  <rect x="11" y="44" width="31" height="9" rx="1.5" fill="white"/>
  <!-- R - leg (diagonal kick) -->
  <path d="M37 53 L56 80 L44 80 L27 56 Z" fill="white"/>

  <!-- I - vertical stroke (positioned so flame sits naturally above) -->
  <rect x="63" y="45" width="11" height="35" rx="1.5" fill="white"/>

  <!-- Flame - main body (yellow, two-lobe shape above I) -->
  <path d="M68.5 42 C68.5 42 63 33 63 26 C63 22 65 19 65 19 C65 23 67 26 68.5 24 C70 26 72 23 72 19 C72 19 74 22 74 26 C74 33 68.5 42 68.5 42 Z" fill="#FFD740"/>
  <!-- Flame - inner warm core -->
  <path d="M66.5 37 C66.5 40 67.5 42 68.5 42 C69.5 42 70.5 40 70.5 37 C70.5 35 69.5 33 69 32 C69 34 68.7 36 68.5 37 C68.3 36 68 34 68 32 C67.5 33 66.5 35 66.5 37 Z" fill="#F5A623"/>
</svg>
